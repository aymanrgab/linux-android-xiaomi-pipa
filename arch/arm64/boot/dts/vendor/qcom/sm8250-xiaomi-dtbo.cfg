# Xiaomi SM8250 (kona) device DTBO entries for dtbo.img
# Matches the 13 device DT overlays under arch/arm64/boot/dts/vendor/qcom/*-sm8250-overlay.dts
# qcom,msm-id = <356 0x0>; # SoC ID for SM8250, revision wildcard 0 = all

[alioth-sm8250]
qcom,msm-id = <356 0x0>;
board-id = <44 0>;
dtb = alioth-sm8250-overlay.dtbo;

