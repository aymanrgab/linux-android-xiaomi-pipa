# Xiaomi SM8250 (kona) device DTBO entries for dtbo.img
# The bootloader matches overlays by the qcom,board-id embedded in each DTB,
# so DTBO header fields (id/rev/custom0-custom3) are all 0.
  version = 0
  page_size = 4096
  id = 0
  rev = 0
  flags = 0
  custom0 = 0
  custom1 = 0
  custom2 = 0
  custom3 = 0

